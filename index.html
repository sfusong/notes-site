<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的笔记</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" disabled>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"
          onerror="window._hljsFailed=true"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onerror="window._katexFailed=true"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onerror="window._katexFailed=true"></script>
</head>
<body>
  <div class="app">

    <!-- ====== Sidebar ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text" id="siteTitle">我的笔记</span>
        </div>
        <button class="icon-btn" id="themePickerBtn" title="切换主题" aria-label="切换主题">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          </svg>
        </button>
      </div>
      <!-- Theme Picker Dropdown -->
      <div class="theme-picker" id="themePicker"></div>

      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索笔记..." autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none" aria-label="清除搜索">✕</button>
      </div>

      <nav class="category-nav" id="categoryNav">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>加载中...</span>
        </div>
      </nav>
    </aside>

    <div class="divider sidebar-divider" id="sidebarDivider">
      <button class="divider-handle" id="sidebarToggle" title="收起/展开分类栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <!-- ====== Note List ====== -->
    <div class="note-list-panel" id="noteListPanel">
      <div class="note-list-header">
        <h2 class="panel-title" id="panelTitle">全部笔记</h2>
        <span class="note-count" id="noteCount"></span>
      </div>
      <div class="note-cards" id="noteCards"></div>
    </div>

    <div class="divider" id="listDivider">
      <button class="divider-handle" id="listToggle" title="收起/展开笔记列表">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <!-- ====== Note Content ====== -->
    <main class="note-content" id="noteContent">
      <div class="reading-progress-bar" id="readingProgress"></div>
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">✦</div>
        <h2>选择一篇笔记开始阅读</h2>
        <p>从左侧选择分类，点击笔记卡片即可阅读</p>
      </div>

      <button class="focus-btn" id="focusBtn" title="专注阅读（ESC 退出）" aria-label="专注阅读">
        <svg class="focus-icon-enter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <svg class="focus-icon-exit" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
      </button>

      <aside class="toc-side hidden" id="tocSide"></aside>

      <article class="note-article hidden" id="noteArticle">
        <div class="article-header">
          <div class="breadcrumb" id="breadcrumb"></div>
          <h1 class="article-title" id="articleTitle"></h1>
          <div class="article-meta" id="articleMeta"></div>
          <button class="toc-toggle hidden" id="tocToggle" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/>
            </svg>
            目录
            <svg class="toc-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
        <div class="toc-inline hidden" id="tocPanel">
          <nav id="tocNav"></nav>
        </div>
        <div class="article-body markdown-body" id="articleBody"></div>
      </article>
    </main>
  </div>

  <!-- ====== Mobile Bottom Nav ====== -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-btn active" data-panel="sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      分类
    </button>
    <button class="mobile-nav-btn" data-panel="list">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      列表
    </button>
    <button class="mobile-nav-btn" data-panel="content">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      阅读
    </button>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
